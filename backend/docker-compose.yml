version: '3.8'

services:
  # Redis - Required for distributed operations
  redis:
    image: redis:7-alpine
    container_name: quickcommerce-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    restart: unless-stopped
    networks:
      - quickcommerce-network

  # MongoDB - Database
  mongodb:
    image: mongo:7
    container_name: quickcommerce-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-changeme}
      MONGO_INITDB_DATABASE: quickcommerce
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - quickcommerce-network

  # API Service - HTTP/WebSocket server (2 replicas)
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: quickcommerce-api-1
    ports:
      - "7000:7000"
    environment:
      PROCESS_ROLE: api
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 7000
      MONGO_URI: mongodb://admin:${MONGO_PASSWORD:-changeme}@mongodb:27017/quickcommerce?authSource=admin
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_SECRET_KEY: ${ADMIN_SECRET_KEY}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:3000}
      TRUST_PROXY: "true"
      LOG_LEVEL: ${LOG_LEVEL:-info}
      ENABLE_REQUEST_LOGGING: "true"
    depends_on:
      redis:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:7000/health/ready"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks:
      - quickcommerce-network

  # API Service - Replica 2
  api-2:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: quickcommerce-api-2
    ports:
      - "7001:7000"
    environment:
      PROCESS_ROLE: api
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 7000
      MONGO_URI: mongodb://admin:${MONGO_PASSWORD:-changeme}@mongodb:27017/quickcommerce?authSource=admin
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_SECRET_KEY: ${ADMIN_SECRET_KEY}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:3000}
      TRUST_PROXY: "true"
      LOG_LEVEL: ${LOG_LEVEL:-info}
      ENABLE_REQUEST_LOGGING: "true"
    depends_on:
      redis:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:7000/health/ready"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks:
      - quickcommerce-network

  # Worker Service - Background job processor
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: quickcommerce-worker
    environment:
      PROCESS_ROLE: worker
      NODE_ENV: ${NODE_ENV:-production}
      HEALTH_CHECK_PORT: 9090
      MONGO_URI: mongodb://admin:${MONGO_PASSWORD:-changeme}@mongodb:27017/quickcommerce?authSource=admin
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      redis:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9090/health"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks:
      - quickcommerce-network

  # Scheduler Service - Scheduled job executor
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: quickcommerce-scheduler
    environment:
      PROCESS_ROLE: scheduler
      NODE_ENV: ${NODE_ENV:-production}
      HEALTH_CHECK_PORT: 9090
      MONGO_URI: mongodb://admin:${MONGO_PASSWORD:-changeme}@mongodb:27017/quickcommerce?authSource=admin
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      AUTO_CANCEL_INTERVAL_MS: ${AUTO_CANCEL_INTERVAL_MS:-10000}
      PAYOUT_BATCH_INTERVAL_MS: ${PAYOUT_BATCH_INTERVAL_MS:-900000}
      ENABLE_PAYOUT_BATCH_JOB: ${ENABLE_PAYOUT_BATCH_JOB:-false}
    depends_on:
      redis:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9090/health"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks:
      - quickcommerce-network

volumes:
  redis-data:
    driver: local
  mongo-data:
    driver: local

networks:
  quickcommerce-network:
    driver: bridge
